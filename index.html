<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luxe Homes – Premium Real Estate India</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
None<style>
  :root {
    --cream: #FAF7F2; --warm-white: #FFFCF8; --gold: #C9A84C;
    --gold-light: #E8C96E; --gold-dark: #9A7530; --charcoal: #1C1C1E;
    --slate: #3A3A3C; --mid: #6C6C70; --pale: #D1C9B8; --pale2: #EDE8DF;
    --accent: #8B4513; --green: #2D6A4F; --card-bg: #FFFFFF;
    --border: #E0D8CC; --shadow: 0 4px 32px rgba(28,28,30,0.08);
    --shadow-lg: 0 12px 60px rgba(28,28,30,0.14);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--charcoal); overflow-x: hidden; line-height: 1.6; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(250,247,242,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 72px; transition: box-shadow 0.3s; }
  nav.scrolled { box-shadow: 0 2px 24px rgba(28,28,30,0.1); }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-svg { width: 42px; height: 42px; flex-shrink: 0; }
  .logo-text-wrap { display: flex; flex-direction: column; line-height: 1.1; }
  .logo-name { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 700; color: var(--charcoal); letter-spacing: 0.04em; }
  .logo-tagline { font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold-dark); font-weight: 500; }
  .nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
  .nav-links a { text-decoration: none; color: var(--slate); font-size: 0.82rem; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; position: relative; padding-bottom: 2px; transition: color 0.2s; }
  .nav-links a::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px; background: var(--gold); transition: width 0.3s; }
  .nav-links a:hover { color: var(--gold-dark); }
  .nav-links a:hover::after { width: 100%; }
  .nav-cta { background: var(--gold); color: #fff !important; padding: 8px 20px !important; border-radius: 4px; transition: background 0.2s !important; }
  .nav-cta:hover { background: var(--gold-dark) !important; }
  .nav-cta::after { display: none !important; }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
  .hamburger span { display: block; width: 24px; height: 2px; background: var(--charcoal); transition: 0.3s; }
  .mobile-menu { display: none; position: fixed; top: 72px; left: 0; right: 0; background: var(--warm-white); border-bottom: 1px solid var(--border); padding: 1.5rem 2rem; z-index: 999; flex-direction: column; gap: 1rem; }
  .mobile-menu.open { display: flex; }
  .mobile-menu a { text-decoration: none; color: var(--slate); font-size: 0.9rem; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }

  #hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 2rem 4rem; background: linear-gradient(160deg, rgba(250,247,242,0.9) 0%, rgba(237,232,223,0.95) 100%), url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1800&q=80') center/cover no-repeat; text-align: center; position: relative; overflow: hidden; }
  .hero-badge { display: inline-block; background: var(--gold); color: #fff; font-size: 0.7rem; letter-spacing: 0.22em; text-transform: uppercase; padding: 6px 18px; border-radius: 2px; margin-bottom: 1.8rem; font-weight: 600; animation: fadeUp 0.8s ease both; }
  .hero-headline { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.8rem, 8vw, 6.5rem); font-weight: 700; line-height: 1.05; color: var(--charcoal); margin-bottom: 1rem; animation: fadeUp 0.8s 0.15s ease both; }
  .hero-headline em { font-style: italic; color: var(--gold-dark); }
  .hero-tagline { font-size: clamp(1rem, 2.5vw, 1.25rem); color: var(--mid); max-width: 540px; margin: 0 auto 0.8rem; font-weight: 300; animation: fadeUp 0.8s 0.28s ease both; }
  .hero-catchphrase { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.1rem, 2.8vw, 1.5rem); color: var(--gold-dark); font-style: italic; margin-bottom: 2.6rem; font-weight: 300; animation: fadeUp 0.8s 0.38s ease both; }
  .hero-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; animation: fadeUp 0.8s 0.5s ease both; }
  .btn-primary { background: var(--gold); color: #fff; padding: 14px 36px; border-radius: 4px; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; text-decoration: none; border: none; cursor: pointer; transition: background 0.25s, transform 0.2s; display: inline-block; }
  .btn-primary:hover { background: var(--gold-dark); transform: translateY(-2px); }
  .btn-outline { background: transparent; color: var(--charcoal); padding: 14px 36px; border-radius: 4px; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; text-decoration: none; border: 2px solid var(--charcoal); cursor: pointer; transition: all 0.25s; display: inline-block; }
  .btn-outline:hover { background: var(--charcoal); color: #fff; transform: translateY(-2px); }
  .hero-stats { display: flex; gap: 3rem; justify-content: center; flex-wrap: wrap; margin-top: 4rem; animation: fadeUp 0.8s 0.62s ease both; }
  .stat { text-align: center; }
  .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 2.6rem; font-weight: 700; color: var(--gold-dark); line-height: 1; }
  .stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--mid); margin-top: 4px; }
  .hero-divider { position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(to bottom, transparent, var(--cream)); }

  section { padding: 90px 2rem; }
  .container { max-width: 1200px; margin: 0 auto; }
  .section-label { font-size: 0.7rem; letter-spacing: 0.26em; text-transform: uppercase; color: var(--gold-dark); font-weight: 600; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.6rem; }
  .section-label::before { content: ''; display: inline-block; width: 28px; height: 1px; background: var(--gold); }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 700; color: var(--charcoal); line-height: 1.1; margin-bottom: 1rem; }
  .section-title em { font-style: italic; color: var(--gold-dark); }
  .section-sub { color: var(--mid); font-size: 0.95rem; max-width: 580px; font-weight: 300; line-height: 1.7; margin-bottom: 3rem; }
  .divider-gold { width: 60px; height: 2px; background: var(--gold); margin: 1.2rem 0 2rem; }

  #search-section { background: var(--charcoal); padding: 50px 2rem; }
  .search-wrap { max-width: 1100px; margin: 0 auto; }
  .search-title { font-family: 'Cormorant Garamond', serif; color: #fff; font-size: 1.6rem; font-weight: 600; margin-bottom: 1.5rem; text-align: center; }
  .search-title span { color: var(--gold-light); font-style: italic; }
  .search-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.9rem; align-items: end; }
  .search-field { display: flex; flex-direction: column; gap: 6px; }
  .search-field label { font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--pale); font-weight: 500; }
  .search-field select, .search-field input { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 11px 14px; border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; outline: none; transition: border 0.2s; appearance: none; }
  .search-field select:focus, .search-field input:focus { border-color: var(--gold-light); }
  .search-field select option { background: var(--charcoal); }
  .search-field input::placeholder { color: rgba(255,255,255,0.35); }
  .search-btn { background: var(--gold); color: #fff; border: none; padding: 12px 28px; border-radius: 4px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; transition: background 0.2s; height: 44px; align-self: flex-end; }
  .search-btn:hover { background: var(--gold-dark); }

  #properties { background: var(--warm-white); }
  .prop-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2.5rem; }
  .prop-tab { padding: 8px 22px; border-radius: 40px; border: 1px solid var(--border); background: transparent; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; cursor: pointer; color: var(--mid); transition: all 0.2s; }
  .prop-tab.active, .prop-tab:hover { background: var(--gold); border-color: var(--gold); color: #fff; }
  .prop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }
  .prop-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow); transition: transform 0.3s, box-shadow 0.3s; border: 1px solid var(--border); display: flex; flex-direction: column; }
  .prop-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }
  .prop-img-wrap { position: relative; overflow: hidden; height: 220px; }
  .prop-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
  .prop-card:hover .prop-img-wrap img { transform: scale(1.06); }
  .no-photo { width: 100%; height: 100%; background: var(--pale2); display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--mid); gap: 8px; font-size: 0.78rem; }
  .prop-badge { position: absolute; top: 14px; left: 14px; padding: 4px 12px; border-radius: 3px; font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; color: #fff; }
  .badge-sale { background: var(--accent); }
  .badge-rent { background: var(--green); }
  .prop-body { padding: 1.4rem; flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
  .prop-type { font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold-dark); font-weight: 600; }
  .prop-name { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 700; color: var(--charcoal); line-height: 1.2; }
  .prop-location { font-size: 0.8rem; color: var(--mid); }
  .prop-price { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; color: var(--gold-dark); margin-top: 0.3rem; }
  .prop-price-per { font-size: 0.75rem; color: var(--mid); font-family: 'DM Sans', sans-serif; font-weight: 400; margin-left: 4px; }
  .prop-specs { display: flex; gap: 1.2rem; flex-wrap: wrap; padding-top: 0.8rem; border-top: 1px solid var(--border); margin-top: 0.5rem; font-size: 0.78rem; color: var(--mid); }
  .prop-footer { padding: 1rem 1.4rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .prop-footer a { font-size: 0.78rem; color: var(--gold-dark); text-decoration: none; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .prop-footer a:hover { color: var(--gold); }
  .no-prop-msg { grid-column: 1/-1; text-align: center; padding: 4rem 1rem; color: var(--mid); font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-style: italic; }

  #about { background: var(--cream); }
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
  .about-img-box { position: relative; }
  .about-img-outer { border-radius: 10px; overflow: hidden; box-shadow: var(--shadow-lg); }
  .about-img-outer img { width: 100%; display: block; height: 480px; object-fit: cover; }
  .about-badge-box { position: absolute; bottom: -28px; right: -28px; background: var(--gold); color: #fff; padding: 1.6rem 2rem; border-radius: 8px; text-align: center; box-shadow: 0 8px 30px rgba(201,168,76,0.45); }
  .about-badge-num { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; font-weight: 700; line-height: 1; }
  .about-badge-label { font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 4px; }
  .timeline { margin-top: 2rem; display: flex; flex-direction: column; gap: 1.4rem; }
  .tl-item { display: flex; gap: 1rem; align-items: flex-start; }
  .tl-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--gold); margin-top: 7px; flex-shrink: 0; }
  .tl-text { font-size: 0.88rem; color: var(--slate); line-height: 1.6; }
  .tl-text strong { color: var(--charcoal); font-weight: 600; }
  .founder-card { margin-top: 2.5rem; background: var(--pale2); border-radius: 8px; padding: 1.4rem 1.6rem; border-left: 3px solid var(--gold); display: flex; gap: 1.2rem; align-items: flex-start; }
  .founder-icon { width: 48px; height: 48px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 700; }
  .founder-name { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 700; color: var(--charcoal); }
  .founder-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--gold-dark); font-weight: 600; }
  .founder-bio { font-size: 0.83rem; color: var(--mid); margin-top: 0.4rem; line-height: 1.65; }

  #stats-strip { background: var(--charcoal); padding: 60px 2rem; }
  .stats-inner { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 2rem; text-align: center; }
  .strip-stat { color: #fff; }
  .strip-num { font-family: 'Cormorant Garamond', serif; font-size: 3rem; font-weight: 700; color: var(--gold-light); line-height: 1; }
  .strip-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--pale); margin-top: 6px; }

  #consultation { background: var(--warm-white); }
  .consult-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 4rem; align-items: start; }
  .consult-why { margin-top: 2rem; display: flex; flex-direction: column; gap: 1.2rem; }
  .why-item { display: flex; gap: 1rem; align-items: flex-start; }
  .why-icon { width: 42px; height: 42px; border-radius: 8px; background: var(--pale2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--gold-dark); }
  .why-title { font-weight: 600; font-size: 0.9rem; color: var(--charcoal); }
  .why-desc { font-size: 0.82rem; color: var(--mid); margin-top: 2px; }
  .consult-form-card { background: var(--card-bg); border-radius: 12px; padding: 2.5rem; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
  .form-title { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; color: var(--charcoal); margin-bottom: 1.6rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1/-1; }
  .form-group label { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mid); font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea { border: 1px solid var(--border); background: var(--cream); border-radius: 5px; padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--charcoal); outline: none; transition: border 0.2s; resize: none; width: 100%; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--gold); }
  .radio-group { display: flex; gap: 1rem; flex-wrap: wrap; }
  .radio-option { display: flex; align-items: center; gap: 7px; cursor: pointer; }
  .radio-option input[type=radio] { accent-color: var(--gold); width: 16px; height: 16px; cursor: pointer; }
  .radio-option span { font-size: 0.85rem; color: var(--slate); font-weight: 500; }
  .contact-options { display: flex; gap: 1rem; flex-wrap: wrap; }
  .contact-option-btn { flex: 1; min-width: 130px; padding: 13px 16px; border-radius: 6px; border: 2px solid var(--border); background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; color: var(--slate); transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .contact-option-btn.selected, .contact-option-btn:hover { border-color: var(--gold); background: var(--gold); color: #fff; }
  .form-submit { width: 100%; background: var(--gold); color: #fff; border: none; border-radius: 5px; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 1rem; }
  .form-submit:hover { background: var(--gold-dark); }
  .form-success { display: none; text-align: center; padding: 2rem 0; flex-direction: column; align-items: center; gap: 1rem; }
  .check-icon { width: 60px; height: 60px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.6rem; }
  .form-success h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; color: var(--charcoal); }
  .form-success p { font-size: 0.88rem; color: var(--mid); }

  #contact { background: var(--cream); }
  .contact-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 4rem; align-items: start; }
  .contact-cards { display: flex; flex-direction: column; gap: 1.2rem; margin-top: 1.5rem; }
  .contact-card { background: var(--card-bg); border-radius: 8px; padding: 1.4rem 1.6rem; border: 1px solid var(--border); display: flex; gap: 1.2rem; align-items: flex-start; box-shadow: var(--shadow); }
  .contact-icon { width: 44px; height: 44px; border-radius: 8px; background: var(--gold); display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; }
  .contact-card-title { font-weight: 600; font-size: 0.85rem; color: var(--charcoal); margin-bottom: 2px; }
  .contact-card-val { font-size: 1rem; color: var(--gold-dark); font-weight: 500; text-decoration: none; display: block; }
  .contact-card-val:hover { text-decoration: underline; }
  .hours-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--mid); font-weight: 600; margin-bottom: 0.8rem; margin-top: 1.6rem; }
  .hours-row { display: flex; justify-content: space-between; font-size: 0.83rem; padding: 7px 0; border-bottom: 1px solid var(--border); color: var(--slate); }
  .quick-form { background: var(--card-bg); border-radius: 10px; padding: 1.6rem; border: 1px solid var(--border); box-shadow: var(--shadow); }
  .quick-form-title { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 700; color: var(--charcoal); margin-bottom: 1rem; }
  .quick-form input, .quick-form textarea { width: 100%; border: 1px solid var(--border); border-radius: 5px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; background: var(--cream); outline: none; margin-bottom: 0.8rem; }
  .quick-form input:focus, .quick-form textarea:focus { border-color: var(--gold); }
  .quick-form textarea { resize: none; }

  footer { background: var(--charcoal); color: var(--pale); padding: 60px 2rem 30px; }
